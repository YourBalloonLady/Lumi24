<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Orders | Lumina</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body{
      background:#f3f4f6;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      color:#0f172a;
    }

    .sidebar{
      width:260px;
      background:#020617;
      color:#fff;
      min-height:100vh;
      padding:20px;
      position:fixed;
      top:0;
      left:0;
    }

    .sidebar a{
      display:block;
      color:#cbd5e1;
      text-decoration:none;
      padding:10px 14px;
      border-radius:12px;
      margin-bottom:8px;
      transition:.2s;
    }

    .sidebar a:hover,
    .sidebar a.active{
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .main{
      margin-left:260px;
      padding:24px;
    }

    .card-box{
      background:#fff;
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
      margin-bottom:20px;
    }

    .order-card{
      border:1px solid rgba(15,23,42,.08);
      border-radius:16px;
      padding:16px;
      margin-bottom:16px;
      background:#fff;
    }

    .status-pill{
      font-size:.75rem;
      padding:5px 10px;
      border-radius:999px;
      font-weight:700;
    }

    .status-pending{background:#fef3c7;color:#92400e;}
    .status-paid{background:#dcfce7;color:#166534;}
    .status-packed{background:#dbeafe;color:#1d4ed8;}
    .status-shipped{background:#ede9fe;color:#6d28d9;}
    .status-cancelled{background:#fee2e2;color:#991b1b;}

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .toolbar input,
    .toolbar select{
      min-width:180px;
    }

    .order-items{
      background:#f8fafc;
      border-radius:12px;
      padding:10px;
      margin-top:10px;
      white-space:pre-line;
      font-size:.92rem;
    }

    .customer-box{
      font-size:.9rem;
      color:#475569;
      margin-top:10px;
    }

    .action-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    @media(max-width:991px){
      .sidebar{
        position:relative;
        width:100%;
        min-height:auto;
      }

      .main{
        margin-left:0;
      }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h4 class="mb-4">🌙 Lumina Admin</h4>

  <a href="admin.html" class="active">
    <i class="fa-solid fa-box me-2"></i> Orders
  </a>

  <a href="analytics.html">
    <i class="fa-solid fa-chart-line me-2"></i> Analytics
  </a>

  <a href="products.html">
    <i class="fa-solid fa-capsules me-2"></i> Products
  </a>

  <a href="reviews.html">
    <i class="fa-solid fa-star me-2"></i> Reviews
  </a>

  <a href="index.html">
    <i class="fa-solid fa-store me-2"></i> Storefront
  </a>

  <hr class="border-secondary">

  <button id="logoutBtn" class="btn btn-outline-light btn-sm w-100">
    Logout
  </button>
</div>

<div class="main">

  <div class="card-box">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h3 class="mb-1">Order Management</h3>
        <p class="text-muted mb-0 small">
          Orders, packing, payments, tracking, customer notes and fulfilment only.
        </p>
      </div>

      <button class="btn btn-dark btn-sm" onclick="loadOrders()">
        Refresh Orders
      </button>
    </div>
  </div>

  <div class="card-box">
    <div class="toolbar">
      <input type="text" id="searchInput" class="form-control" placeholder="Search order ref, email or postcode">

      <select id="statusFilter" class="form-select">
        <option value="">All Statuses</option>
        <option value="Pending">Pending</option>
        <option value="Paid">Paid</option>
        <option value="Packed">Packed</option>
        <option value="Shipped">Shipped</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>
  </div>

  <div id="ordersContainer"></div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://qketnqhfjfxbqiuqevnh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrZXRucWhmamZ4YnFpdXFldm5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2NjkzMzAsImV4cCI6MjA4MDI0NTMzMH0.JIrgLIwWIA5Gwu9K4BsgS0Y_jyax2G6irqkaf35aPys";
    const ADMIN_EMAIL = "luminaweight@gmail.com";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let orders = [];

async function loadOrders(){
  const { data, error } = await supabaseClient
    .from('Orders')
    .select('*')
    .order('created_at', { ascending:false });

  if(error){
    console.error(error);
    alert('Failed to load orders');
    return;
  }

  orders = data || [];
  renderOrders();
}

function getStatusClass(status=''){
  status = status.toLowerCase();

  if(status === 'pending') return 'status-pending';
  if(status === 'paid') return 'status-paid';
  if(status === 'packed') return 'status-packed';
  if(status === 'shipped') return 'status-shipped';
  if(status === 'cancelled') return 'status-cancelled';

  return 'status-pending';
}

function renderOrders(){
  const container = document.getElementById('ordersContainer');

  const query = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;

  let filtered = orders.filter(order => {
    const customer = order.details?.customer || {};

    const matchesSearch = (
      String(order.reference || '').toLowerCase().includes(query) ||
      String(customer.email || '').toLowerCase().includes(query) ||
      String(customer.postcode || '').toLowerCase().includes(query)
    );

    const matchesStatus = !status || order.status === status;

    return matchesSearch && matchesStatus;
  });

  if(!filtered.length){
    container.innerHTML = `
      <div class="card-box text-center text-muted">
        No orders found.
      </div>
    `;
    return;
  }

  container.innerHTML = filtered.map(order => {

    const customer = order.details?.customer || {};
    const items = order.details?.items || [];

    return `
      <div class="order-card">

        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
          <div>
            <div class="fw-bold fs-5">${order.reference || 'No Ref'}</div>
            <div class="text-muted small">
              ${new Date(order.created_at).toLocaleString()}
            </div>
          </div>

          <div>
            <span class="status-pill ${getStatusClass(order.status)}">
              ${order.status || 'Pending'}
            </span>
          </div>
        </div>

        <div class="customer-box">
          <strong>${customer.name || 'Unknown Customer'}</strong><br>
          ${customer.email || ''}<br>
          ${customer.address1 || ''} ${customer.address2 || ''}<br>
          ${customer.city || ''} ${customer.postcode || ''}
        </div>

        <div class="order-items">
${items.map(i => `${i.qty}x ${i.name}`).join('\n')}
        </div>

        <div class="mt-3 fw-bold">
          Total: £${Number(order.total_amount || 0).toFixed(2)}
        </div>

        <div class="action-row">
          <button class="btn btn-success btn-sm" onclick="updateStatus('${order.id}','Paid')">
            Mark Paid
          </button>

          <button class="btn btn-primary btn-sm" onclick="updateStatus('${order.id}','Packed')">
            Mark Packed
          </button>

          <button class="btn btn-dark btn-sm" onclick="updateStatus('${order.id}','Shipped')">
            Mark Shipped
          </button>

          <button class="btn btn-danger btn-sm" onclick="updateStatus('${order.id}','Cancelled')">
            Cancel
          </button>
        </div>

      </div>
    `;

  }).join('');
}

async function updateStatus(id,status){

  const { error } = await supabaseClient
    .from('Orders')
    .update({ status })
    .eq('id', id);

  if(error){
    console.error(error);
    alert('Failed to update');
    return;
  }

  loadOrders();
}

async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
}

document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('searchInput').addEventListener('input', renderOrders);
document.getElementById('statusFilter').addEventListener('change', renderOrders);

loadOrders();
</script>

</body>
</html>
