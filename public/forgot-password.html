<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password | Lumina Weight</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:system-ui;padding:24px;max-width:520px;margin:0 auto}
    input,button{width:100%;padding:12px;margin:8px 0;font-size:16px}
  </style>
</head>
<body>
  <h1>Forgot password</h1>
  <p>Enter your email and we’ll send a reset link.</p>

  <form id="fpForm">
    <input id="email" type="email" placeholder="Email address" required />
    <button type="submit">Send reset link</button>
  </form>

  <p id="msg"></p>

  <script>
    const SUPABASE_URL = "https://qketnqhfjfxbqiuqevnh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrZXRucWhmamZ4YnFpdXFldm5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2NjkzMzAsImV4cCI6MjA4MDI0NTMzMH0.JIrgLIwWIA5Gwu9K4BsgS0Y_jyax2G6irqkaf35aPys";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("fpForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();

      const button = e.currentTarget.querySelector('button[type="submit"]');
      button.disabled = true;

      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: new URL("/reset-password.html", window.location.origin).href
        });

        document.getElementById("msg").textContent = error
          ? ("Error: " + error.message)
          : "If an account exists for that address, a reset link has been sent.";
      } catch {
        document.getElementById("msg").textContent = "Unable to send a reset link right now. Please try again.";
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
