<!-- Add this section after the delivery address fields, before Order summary -->

<hr class="my-4">

<h4 class="mb-3 fw-semibold">Delivery option</h4>

<div class="delivery-options">
  <label class="delivery-option">
    <input type="radio" name="deliveryOption" value="tracked24" checked onchange="setDeliveryOption('tracked24')">
    <div>
      <strong>Tracked24</strong>
      <small>Free</small>
    </div>
    <span>£0.00</span>
  </label>

  <label class="delivery-option">
    <input type="radio" name="deliveryOption" value="signed" onchange="setDeliveryOption('signed')">
    <div>
      <strong>Signed For Recorded Delivery</strong>
      <small>Recommended if you want signed proof of delivery</small>
    </div>
    <span>£7.00</span>
  </label>
</div>
