<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protocol Bundles | Lumina</title>
  
  <link rel="icon" type="image/png" href="/Favicon.png?v=4" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --lw-mint: #22c55e;
      --lw-mint-dark: #15803d;
      --lw-bg: #f8fafc;
      --lw-card: #ffffff;
      --lw-text: #0f172a;
      --lw-muted: #64748b;
      --lw-border: #e2e8f0;
      --lw-shadow: 0 10px 30px rgba(15,23,42,.06);
      --lw-radius: 20px;
    }

    body {
      background: var(--lw-bg);
      color: var(--lw-text);
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Navbar matches your products.html */
    .site-header {
      background: #fff;
      border-bottom: 1px solid var(--lw-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header .inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand { font-weight: 800; display: flex; align-items: center; gap: 10px; color: inherit; text-decoration: none; }
    .brand img { width: 34px; border-radius: 8px; }

    /* Hero */
    .hero {
      padding: 60px 16px;
      text-align: center;
      background: linear-gradient(180deg, #fff 0%, var(--lw-bg) 100%);
    }
    .hero h1 { font-weight: 900; font-size: 3rem; letter-spacing: -0.03em; }

    /* Bundle Grid */
    .page-section { max-width: 1200px; margin: 0 auto; padding: 20px 16px 100px; }
    
    .bundle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
    }

    .bundle-card {
      background: var(--lw-card);
      border: 1px solid var(--lw-border);
      border-radius: var(--lw-radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s;
    }
    .bundle-card:hover { transform: translateY(-5px); box-shadow: var(--lw-shadow); }

    .bundle-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; }
    
    .bundle-body { padding: 24px; display: flex; flex-direction: column; flex-grow: 1; }
    
    .bundle-tag {
      display: inline-block;
      background: var(--lw-mint-soft);
      color: var(--lw-mint-dark);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 12px;
    }

    .bundle-includes {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 15px;
      margin: 15px 0;
      font-size: 0.9rem;
    }
    .bundle-includes ul { list-style: none; padding: 0; margin: 0; }
    .bundle-includes li::before { content: "✓ "; color: var(--lw-mint); font-weight: bold; }

    .price-row { display: flex; align-items: baseline; gap: 10px; margin-top: auto; }
    .price { font-size: 1.8rem; font-weight: 900; color: var(--lw-mint-dark); }
    .old-price { text-decoration: line-through; color: var(--lw-muted); font-size: 1rem; }

    .btn-group-lw { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .btn-lw { padding: 12px; border-radius: 12px; font-weight: 700; text-align: center; text-decoration: none; }
    .btn-view { background: #f1f5f9; color: var(--lw-text); }
    .btn-enquire { background: var(--lw-text); color: #fff; }

    /* Footer Sticky Note */
    .research-notice {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.9);
      color: #fff;
      padding: 10px 25px;
      border-radius: 99px;
      font-size: 0.8rem;
      z-index: 1000;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="inner">
      <a href="/" class="brand">
        <img src="/Favicon.png?v=4" alt="Lumina">
        <span>Lumina</span>
      </a>
      <nav class="d-none d-md-flex gap-3">
        <a href="/" class="text-dark text-decoration-none fw-semibold">Home</a>
        <a href="/products.html" class="text-dark text-decoration-none fw-semibold">Products</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <h1>Protocol Bundles</h1>
    <p class="text-muted">Optimized research combinations with reference pricing.</p>
  </section>

  <main class="page-section">
    <div class="mb-4">
      <input type="text" id="bundleSearch" class="form-control form-control-lg" placeholder="Search bundles..." style="border-radius: 15px;">
    </div>

    <div class="bundle-grid" id="bundleGrid">
      </div>
  </main>

  <div class="research-notice">
    Laboratory Research Use Only • Not for Human Consumption
  </div>

  <script>
    // 1. DATA OBJECT (Mirroring your product database logic)
    const bundles = [
      {
        id: "b1",
        name: "Ultimate Metabolic Stack",
        tag: "Advanced Synergy",
        desc: "Triple-pathway receptor targeting with mitochondrial support.",
        image: "/images/ultimate-metabolic-stack.png",
        contents: ["Retatrutide 60mg", "MOTS-C 40mg", "Refill Pen Device"],
        price: 220,
        oldPrice: 255
      },
      {
        id: "b2",
        name: "Total Repair Protocol",
        tag: "Recovery",
        desc: "Tissue repair and skin rejuvenation foundation.",
        image: "/images/bundle-placeholder-3.png",
        contents: ["BPC-157 & TB500 10mg", "GHK-CU 100mg"],
        price: 70,
        oldPrice: 80
      },
      {
        id: "b3",
        name: "Beginner Protocol",
        tag: "Starter",
        desc: "High-purity research materials with professional hardware.",
        image: "/images/bundle-placeholder-1.png",
        contents: ["Tirzepatide 20mg", "Refill Pen Device"],
        price: 120,
        oldPrice: 130
      }
    ];

    // 2. RENDER FUNCTION
    function loadBundles(filter = "") {
      const container = document.getElementById('bundleGrid');
      container.innerHTML = "";

      const filtered = bundles.filter(b => 
        b.name.toLowerCase().includes(filter.toLowerCase()) || 
        b.contents.some(c => c.toLowerCase().includes(filter.toLowerCase()))
      );

      filtered.forEach(bundle => {
        const card = `
          <article class="bundle-card">
            <img src="${bundle.image}" alt="${bundle.name}" class="bundle-img">
            <div class="bundle-body">
              <span class="bundle-tag">${bundle.tag}</span>
              <h2 class="h4 fw-bold mb-2">${bundle.name}</h2>
              <p class="text-muted small">${bundle.desc}</p>
              
              <div class="bundle-includes">
                <ul class="mb-0">
                  ${bundle.contents.map(item => `<li>${item}</li>`).join('')}
                </ul>
              </div>

              <div class="price-row">
                <span class="price">£${bundle.price}</span>
                <span class="old-price">£${bundle.oldPrice}</span>
              </div>

              <div class="btn-group-lw">
                <a href="/products.html" class="btn-lw btn-view">Products</a>
                <a href="/contact.html" class="btn-lw btn-enquire">Enquire</a>
              </div>
            </div>
          </article>
        `;
        container.innerHTML += card;
      });
    }

    // 3. INITIALIZE & SEARCH
    document.getElementById('bundleSearch').addEventListener('input', (e) => {
      loadBundles(e.target.value);
    });

    loadBundles();
  </script>
</body>
</html>
